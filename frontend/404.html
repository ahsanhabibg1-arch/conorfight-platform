<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <title>Page Not Found · ConorFight</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        .notfound { min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; }
        .notfound h1 { font-size: clamp(4rem, 18vw, 9rem); color: var(--red); line-height: 1; }
        .notfound h2 { font-size: 1.6rem; margin: 8px 0 14px; }
        .notfound p { color: var(--text); max-width: 460px; margin-bottom: 28px; }
    </style>
</head>
<body>
    <div class="notfound">
        <h1>404</h1>
        <h2>This fight isn't on the card</h2>
        <p>The page you're looking for doesn't exist or may have moved. Let's get you back to the action.</p>
        <a href="/" class="btn btn-primary">← Back to Home</a>
    </div>
</body>
</html>
